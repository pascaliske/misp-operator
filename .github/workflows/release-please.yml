---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          config-file: .github/release-please-config.json
          manifest-file: .release-please-manifest.json
          token: '${{ secrets.RELEASE_PLEASE_TOKEN }}'

      - name: Generate installer manifest
        if: ${{ steps.release.outputs.release_created }}
        run: |
          make build-installer IMG=ghcr.io/pascaliske/misp-operator:${{ steps.release.outputs.tag_name }}

      - name: Upload installer manifest
        if: ${{ steps.release.outputs.release_created }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ steps.release.outputs.tag_name }} ./dist/install.yaml
