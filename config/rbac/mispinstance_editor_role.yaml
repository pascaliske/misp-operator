# This rule is not used by the project misp-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the misp.k8s.pascaliske.dev.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: misp-operator
    app.kubernetes.io/managed-by: kustomize
  name: mispinstance-editor-role
rules:
- apiGroups:
  - misp.k8s.pascaliske.dev
  resources:
  - mispinstances
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - misp.k8s.pascaliske.dev
  resources:
  - mispinstances/status
  verbs:
  - get
