# This rule is not used by the project misp-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to misp.k8s.pascaliske.dev resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: misp-operator
    app.kubernetes.io/managed-by: kustomize
  name: mispinstance-viewer-role
rules:
- apiGroups:
  - misp.k8s.pascaliske.dev
  resources:
  - mispinstances
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - misp.k8s.pascaliske.dev
  resources:
  - mispinstances/status
  verbs:
  - get
