# This rule is not used by the project misp-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over misp.k8s.pascaliske.dev.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: misp-operator
    app.kubernetes.io/managed-by: kustomize
  name: mispinstance-admin-role
rules:
- apiGroups:
  - misp.k8s.pascaliske.dev
  resources:
  - mispinstances
  verbs:
  - '*'
- apiGroups:
  - misp.k8s.pascaliske.dev
  resources:
  - mispinstances/status
  verbs:
  - get
