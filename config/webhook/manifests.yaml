---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: mutating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /mutate-misp-k8s-pascaliske-dev-v1alpha1-mispinstance
  failurePolicy: Fail
  name: mmispinstance-v1alpha1.kb.io
  rules:
  - apiGroups:
    - misp.k8s.pascaliske.dev
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - mispinstances
  sideEffects: None
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-misp-k8s-pascaliske-dev-v1alpha1-mispinstance
  failurePolicy: Fail
  name: vmispinstance-v1alpha1.kb.io
  rules:
  - apiGroups:
    - misp.k8s.pascaliske.dev
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - mispinstances
  sideEffects: None
